apiVersion: apps/v1
kind: Deployment
metadata:
  name: max-notification-service
  labels:
    app: max-notification-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: max-notification-service
  template:
    metadata:
      labels:
        app: max-notification-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: max-notification-service
        image: your-registry/max-notification-service:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: SERVER_PORT
          value: "8080"
        - name: METRICS_PORT
          value: "9090"
        - name: MAX_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: max-bot-secret
              key: token
        - name: MAX_BOT_BASE_URL
          value: "https://botapi.max.ru"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "jaeger-collector.observability:4318"
        - name: SERVICE_VERSION
          value: "1.0.0"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: tmp-volume
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - max-notification-service
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: max-notification-service
  labels:
    app: max-notification-service
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: max-notification-service
---
apiVersion: v1
kind: Secret
metadata:
  name: max-bot-secret
type: Opaque
stringData:
  token: "YOUR_MAX_BOT_TOKEN_HERE"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: max-notification-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - notifications.yourdomain.com
    secretName: notifications-tls
  rules:
  - host: notifications.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: max-notification-service
            port:
              number: 80
